<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Реактора (Торий)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar panel">
            <h2>Настройки</h2>
            
            <div class="control-group">
                <label>Размеры (X, Z, Высота):</label>
                <div class="dimensions">
                    <input type="number" id="dim-x" value="5" min="1" max="32" title="Ширина">
                    <input type="number" id="dim-z" value="5" min="1" max="32" title="Длина">
                    <input type="number" id="dim-y" value="5" min="1" max="48" title="Высота">
                </div>
                <small>Максимум: 32x32x48</small>
            </div>

            <div class="control-group">
                <label>Погружение стержней (%):</label>
                <input type="range" id="insertion" min="0" max="100" value="0">
                <span id="insertion-val">0%</span>
            </div>

            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="active-cooling"> Активное охлаждение
                </label>
            </div>

            <button id="btn-reset" class="btn">Очистить реактор</button>

            <h3>Материалы</h3>
            <div id="palette" class="palette">
                </div>
        </aside>

        <main class="main-content panel">
            <h2>Схема реактора (вид сверху)</h2>
            <div id="grid-container" class="grid-container">
                </div>
            <p class="hint">Кликни или тяни мышку по клеткам, чтобы закрасить.</p>
        </main>

        <aside class="results panel">
            <h2>Показатели</h2>
            <div class="result-item">
                <span class="label">Выработка:</span>
                <span id="res-output" class="value">0</span> <span id="res-unit">RF/t</span>
            </div>
            <div class="result-item">
                <span class="label">Расход топлива (Торий):</span>
                <span id="res-fuel" class="value">0</span> <span class="unit">mB/t</span>
            </div>
            <div class="result-item">
                <span class="label">Температура топлива:</span>
                <span id="res-fuel-heat" class="value">20</span> <span class="unit">°C</span>
            </div>
            <div class="result-item">
                <span class="label">Температура корпуса:</span>
                <span id="res-casing-heat" class="value">20</span> <span class="unit">°C</span>
            </div>
            <div class="result-item">
                <span class="label">Эффективность (Fertility):</span>
                <span id="res-fertility" class="value">0</span> <span class="unit">%</span>
            </div>
            
            <hr>
            <h3>Ресурсы (Смета)</h3>
            <ul id="res-costs" class="costs-list">
                </ul>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
